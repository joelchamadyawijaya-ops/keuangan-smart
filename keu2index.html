<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Fintech Full</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:sans-serif;background:#0f172a;color:white}
.card{background:#1e293b;padding:20px;margin:10px;border-radius:10px}
input,button{padding:10px;margin:5px}
</style>
</head>

<body>

<div id="auth">
  <h2>Login</h2>
  <input id="user">
  <input id="pass" type="password">
  <button onclick="login()">Login</button>
  <button onclick="register()">Register</button>
</div>

<div id="app" style="display:none">

<div class="card">
<h3>Status AI</h3>
<p id="status"></p>
</div>

<div class="card">
<h3>Tambah Pengeluaran</h3>
<input id="exp" type="number">
<button onclick="add()">Tambah</button>
</div>

<div class="card">
<h3>Kurs</h3>
USD: <span id="usd"></span>
</div>

<canvas id="chart"></canvas>

</div>

<script>
let token="";
let chart;

/* AUTH */
async function login(){
 let r=await fetch("http://localhost:3000/login",{
  method:"POST",
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({username:user.value,password:pass.value})
 });
 let d=await r.json();
 token=d.token;
 start();
}

async function register(){
 await fetch("http://localhost:3000/register",{
  method:"POST",
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({username:user.value,password:pass.value})
 });
 alert("registered");
}

/* START */
function start(){
 auth.style.display="none";
 app.style.display="block";
 load();
}

/* LOAD DATA */
async function load(){
 let exp=await fetch("http://localhost:3000/expense",{headers:{authorization:token}});
 let data=await exp.json();

 let ai=await fetch("http://localhost:3000/ai",{headers:{authorization:token}});
 let aiData=await ai.json();

 status.innerText=aiData.status + " (Rp "+aiData.total+")";

 chart=new Chart(document.getElementById("chart"),{
  type:"line",
  data:{labels:data.map((_,i)=>i),datasets:[{data:data}]}
 });

 let rate=await fetch("http://localhost:3000/rates");
 let r=await rate.json();
 usd.innerText=r.rates.USD;
}

/* ADD EXPENSE */
async function add(){
 await fetch("http://localhost:3000/expense",{
  method:"POST",
  headers:{
    'Content-Type':'application/json',
    authorization:token
  },
  body:JSON.stringify({amount:Number(exp.value)})
 });
 location.reload();
}
</script>

</body>
</html>
